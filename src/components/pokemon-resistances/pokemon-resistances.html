@if (resistances(); as resistances) {
    <div class="grid grid-cols-6 gap-4 shadow-2xl ring-1 ring-purple-600 p-4">
        <ng-container *ngFor="let resistance of resistances">
            <img 
                [style.opacity]="resistance.multiplier > 0 ? resistance.multiplier / 2 : 0.25"
                [src]="getResistanceImage(resistance.name)" 
            />
            <div class="m-auto">
                x {{ resistance.multiplier}}
            </div>
        </ng-container>
    </div>
}
