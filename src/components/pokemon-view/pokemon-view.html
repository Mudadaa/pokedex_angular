@if (pokemon(); as pokemon;) {

<div
  class="w-full flex flex-col md:flex-row gap-6 items-start rounded-xl border border-white/30 bg-white/20 backdrop-blur-md shadow-lg p-6"
>
  <!-- Colonne gauche : Nom / Image / Types -->
  <div class="flex flex-col gap-4 p-2">
    <!-- Nom -->
    <div class="flex flex-col md:items-center">
      <div>
        <h2 class="text-2xl font-bold text-slate-900 pr-3">
          {{ pokemon.name.fr }}
        </h2>
      </div>
      <div>
        <h2 class="text-2xl font-bold text-slate-900 pr-3">
          {{ pokemon.name.en }}
        </h2>
      </div>

      <div>
        <h2 class="text-2xl font-bold text-slate-900 pr-3">
          {{ pokemon.name.jp }}
        </h2>
      </div>
    </div>

    <!-- Image -->
    <div
      class="h-fullflex justify-center rounded-xl border border-slate-200 bg-white p-4"
    >
      <img
        [src]="pokemon.sprites.regular"
        [alt]="'Sprite de ' + pokemon.name.fr"
        class="object-contain drop-shadow w-full h-auto max-h-[70vh]"
        loading="lazy"
      />
      <app-pokemon-evolutions-formes
        [evolutions]="pokemon.evolution"
        [formes]="pokemon.formes"
        class="p-2"
      >
      </app-pokemon-evolutions-formes>
    </div>

    <!-- Types -->
    <div class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
      <h3 class="text-sm font-semibold text-slate-600 mb-2">Types</h3>
      <app-pokemon-type-informations
        class="block w-full"
        [types]="pokemon.types"
      >
      </app-pokemon-type-informations>
    </div>
  </div>

  <div class="flex flex flex-col md:flex-row gap-3 justify-evenly items-start mt-4 md:mt-0">
    <!-- Bloc droite : Résistances -->
    <div
      class="w-fit flex-col rounded-xl border border-slate-200 bg-white p-4 shadow-sm"
    >
      <h3 class="text-sm font-semibold text-slate-600 mb-2">Résistances</h3>
      <app-pokemon-resistances [resistances]="pokemon.resistances">
      </app-pokemon-resistances>
    </div>
    <!-- Bloc droite : Statistiques -->
    <div
      class="w-64 flex-col rounded-xl border border-slate-200 bg-white p-3 shadow-sm"
    >
      <h3 class="text-sm font-semibold text-slate-600 mb-2">Stats</h3>
      <app-pokemon-statistics [statistics]="pokemon.stats">
      </app-pokemon-statistics>
    </div>
  </div>
</div>

}
