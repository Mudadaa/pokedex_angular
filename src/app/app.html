<main class="flex flex-col p-8 bg-[radial-gradient(circle_at_50%_35%,#38072b_0%,#25071c_48%,#10020c_100%)] min-h-screen  ">

  <h1 class="flex items-center justify-center text-3xl bg-[#BC564F] w-fit text-white p-2 rounded mb-5 mx-auto md:mx-0 md:justify-start">
    <!-- mx-auto centre le bloc -->
  Pokedex Angular
</h1>


  <form class=" flex justify-center mt-8 mb-9 align-items md:justify-start " [formGroup]="pokemonForm" (ngSubmit)="onSubmit()">
    <label class="bg-[#BC564F] text-white  p-2 rounded" for="pokemon-name">Nom du pokemon :</label>
    <input name="pokemon-name" formControlName="pokemonName" class="shadow border border-white/30 bg-white/20 backdrop-blur-md rounded mx-4 p-1" />
   <button  type="submit" class="bg-[#BC564F] hover:bg-[#9A4B41] text-white fond-bold p-2 rounded">
        Rechercher
    </button>
  </form>


 
  <div class="flex items-center justify-center" *ngIf="!pokemonData && !pokemonNotExist">
   <img src="/oak_ash.jpg" 
   class="rounded"
   alt="red_and_professor_oak_standing_next_to_eachother">
  </div>
<div class=" md:flex md:flex-row md:justify-around ">
  <div *ngIf="pokemonData" class="mt-4  ">
    <app-pokemon-view [pokemon]="pokemonData"></app-pokemon-view>
  </div>
  <div *ngIf="pokemonNotExist" class="mt-4">
    <p>Le pokemon {{ pokemonNotFoundName }} n'existe pas </p>
  </div>
</div>
</main>

<router-outlet />
